<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Triangle - Love is... 응원법 연습실</title>
    <style>
        :root {
            --soft-blue: #f0f7ff;
            --white: #ffffff;
            --text-main: #2d3436;
            --text-next: #b2bec3;
            --chant-blue: #007bff;
            --chant-red: #ff4757;
            --chant-green: #28a745;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: var(--soft-blue);
            color: var(--text-main);
            margin: 0; display: flex; flex-direction: column; align-items: center;
        }

        .container { max-width: 900px; width: 95%; margin: 40px auto; text-align: center; }
        
        .video-wrapper { 
            width: 100%; aspect-ratio: 16 / 9; background: #000; border-radius: 24px; 
            position: relative; overflow: hidden; border: 8px solid var(--white);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        video { width: 100%; height: 100%; }

        /* 가사 영역 디자인 */
        .lyrics-area {
            background: var(--white);
            padding: 25px; border-radius: 20px; min-height: 140px;
            margin-top: 25px; box-shadow: 0 10px 20px rgba(0,0,0,0.03);
            display: flex; flex-direction: column; gap: 15px; align-items: center;
        }

        /* 현재 가사 (크게) */
        #current-line {
            font-size: 1.8rem; font-weight: 800; min-height: 2.2rem;
            display: flex; align-items: center; justify-content: center;
        }

        /* 다음 가사 (작게) */
        #next-line {
            font-size: 1.2rem; font-weight: 500; color: var(--text-next);
            min-height: 1.5rem; opacity: 0.8;
        }

        /* 색상 스타일 */
        .chant-blue { color: var(--chant-blue); }
        .chant-red { color: var(--chant-red); }
        .chant-green { color: var(--chant-green); }

        /* 타자기 애니메이션 */
        .typing {
            display: inline-block;
            overflow: hidden;
            white-space: nowrap;
            border-right: 3px solid var(--text-main);
            animation: typing 0.9s steps(40, end), blink 0.7s step-end infinite;
        }

        @keyframes typing {
            from { width: 0; }
            to { width: 100%; }
        }
        @keyframes blink {
            from, to { border-color: transparent; }
            50% { border-color: var(--text-main); }
        }

        #play-btn {
            margin-top: 25px; padding: 15px 50px; font-size: 1.2rem; font-weight: bold;
            background: #00FF00; border: none; border-radius: 50px; cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,255,0,0.3);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="video-wrapper">
        <video id="mv-video" src="videoplayback.mp4"></video>
    </div>

    <div class="lyrics-area">
        <div id="current-line"></div>
        <div id="next-line">연습 시작 버튼을 눌러주세요!</div>

    <button id="play-btn">연습 시작하기</button>
</div>

    const video = document.getElementById('mv-video');
    const playBtn = document.getElementById('play-btn');
    const currentLine = document.getElementById('current-line');
    const nextLine = document.getElementById('next-line');
    let lastIndex = -1;

    playBtn.addEventListener('click', () => {
        video.play();
        playBtn.style.display = 'none';
    });

    video.addEventListener('timeupdate', () => {
        const currentTime = video.currentTime;
        
        // 현재 인덱스 찾기
        const currentIndex = lyricsData.findLastIndex(l => currentTime >= l.time);

        if (currentIndex !== -1 && currentIndex !== lastIndex) {
            const currentData = lyricsData[currentIndex];
            const nextData = lyricsData[currentIndex + 1];

            // 현재 가사 업데이트 (타이핑 애니메이션 포함)
            currentLine.innerHTML = `<span class="typing">${currentData.text}</span>`;
            
            // 다음 가사 예고 업데이트 (애니메이션 없이 정적으로 표시)
            if (nextData) {
                // 다음 가사는 태그를 제거하고 텍스트만 깔끔하게 보여줌
                const tempDiv = document.createElement("div");
                tempDiv.innerHTML = nextData.text;
                nextLine.innerText = "Next: " + tempDiv.innerText;
            } else {
                nextLine.innerText = "TRIANGLE Forever!";
            }

            lastIndex = currentIndex;
        }
    });
</script>

</body>
</html>
