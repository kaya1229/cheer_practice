<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Triangle - Love is... Karaoke Studio</title>
    <style>
        :root {
            --karaoke-bg: #000080; /* 노래방 특유의 남색 배경 */
            --white: #ffffff;
            --gray-text: rgba(255, 255, 255, 0.3);
            --neo-green: #00FF00;
            --chant-red: #ff4757;
            --chant-blue: #3498db;
            --chant-green: #2ecc71;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: var(--karaoke-bg);
            color: var(--white);
            margin: 0; display: flex; flex-direction: column; align-items: center;
            overflow-x: hidden;
        }

        .container { max-width: 1000px; width: 95%; margin: 20px auto; text-align: center; }

        /* 비디오 및 스탬프 */
        .video-wrapper { 
            width: 100%; aspect-ratio: 16 / 9; border-radius: 15px; 
            position: relative; overflow: hidden; border: 5px solid var(--white);
            box-shadow: 0 0 30px rgba(0,0,0,0.5); background: #000;
        }
        video { width: 100%; height: 100%; object-fit: cover; }

        #stamp {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
            z-index: 10; background: rgba(255, 255, 255, 0.9); padding: 20px 40px;
            border: 6px double var(--chant-red); color: var(--chant-red);
            font-size: 2rem; font-weight: 900; border-radius: 10px;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #stamp.pop { transform: translate(-50%, -50%) scale(1); }

        /* 노래방 가사 스타일 */
        .lyrics-container {
            margin-top: 30px; min-height: 200px;
            display: flex; flex-direction: column; align-items: center;
        }

        .karaoke-line {
            font-size: 2.5rem; font-weight: 900; position: relative;
            display: inline-block; color: var(--gray-text);
            -webkit-text-stroke: 1.5px rgba(0,0,0,0.7);
            text-shadow: 3px 3px 5px rgba(0,0,0,0.5);
            white-space: nowrap; margin-bottom: 20px;
        }

        /* 색상 채워지는 레이어 */
        .karaoke-line::after {
            content: attr(data-text);
            position: absolute; left: 0; top: 0;
            width: 0%; height: 100%; overflow: hidden;
            white-space: nowrap; color: var(--neo-green); /* 기본 색상 */
            transition: width 0s linear;
        }

        /* 응원법별 채우기 색상 */
        .karaoke-line.red::after { color: var(--chant-red); }
        .karaoke-line.blue::after { color: var(--chant-blue); }
        .karaoke-line.green::after { color: var(--chant-green); }

        #next-line { font-size: 1.3rem; color: rgba(255,255,255,0.5); font-weight: 500; }
        
        .score-board { font-size: 1.5rem; margin: 10px 0; color: #ffde06; font-weight: bold; }

        #start-btn {
            padding: 15px 60px; font-size: 1.5rem; font-weight: 900;
            background: #ffde06; border: none; border-radius: 10px;
            cursor: pointer; color: #000; box-shadow: 0 5px 0 #c4ab00;
        }
        #start-btn:active { transform: translateY(3px); box-shadow: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="score-board">SCORE: <span id="score">0</span></div>
    
    <div class="video-wrapper">
        <video id="mv" src="videoplayback.mp4"></video>
        <div id="stamp">참 잘했어요!</div>
    </div>

    <div class="lyrics-container">
        <div id="current-box">
            <span id="current-line" class="karaoke-line" data-text="READY?">READY?</span>
        </div>
        <div id="next-line">잠시만 기다려주세요...</div>
    </div>

    <button id="start-btn">시작 (START)</button>
</div>

<script>
    const lyricsData = [
        { time: 0.5, text: "Are you ready? (YEAH~)", color: "blue" },
        { time: 27.0, text: "(댄스머신 황현우!)", color: "red" },
        { time: 29.0, text: "Everybody (절대매력 번도미!)", color: "red" },
        { time: 31.0, text: "Everybody, body (폭풍래퍼 구상구!)", color: "red" },
        { time: 35.0, text: "Uh Uh Come on now", color: "" },
        { time: 38.0, text: "Let me hear you say What's up", color: "" },
        { time: 41.0, text: "Say 트-트-트-트라이 앵글", color: "green" },
        { time: 43.5, text: "Say 트-트-트-트라이 앵글 Uh!", color: "green" },
        { time: 46.0, text: "너를 만난건 가장 큰 행운이야", color: "" },
        { time: 50.0, text: "나의 모든 날을 다 돌아보면", color: "" },
        { time: 54.0, text: "너를 알아갈수록 자꾸 두려워져", color: "" },
        { time: 58.0, text: "어디까지가 네 진심일까 (내꺼하자 황현우!)", color: "red" },
        { time: 63.0, text: "설마 너 이러면 어떡하지 (왜!)", color: "blue" }, // 요청하신 +1초 반영
        { time: 65.5, text: "저러면 어떡하지 (왜!)", color: "blue" },
        { time: 68.0, text: "그러고 있을거야 보나마나 뻔하잖아 uh", color: "" },
        { time: 71.0, text: "그만하고 대답해 줄래? (내꺼하자 번도미!)", color: "red" },
        { time: 75.0, text: "아직은 아냐 (왜!), 지금 말야", color: "blue" },
        { time: 79.0, text: "그러면 안돼 (왜!), 이러면 안돼", color: "blue" },
        { time: 83.0, text: "뭐가 그리 복잡해 baby", color: "" },
        { time: 86.0, text: "사랑은 왜 이리 왜 이리 어려운건지", color: "" },
        { time: 91.0, text: "영원할 거라고 (워어어)", color: "blue" },
        { time: 95.0, text: "계속 될 거라고 약속해 my love (약속해!)", color: "blue" },
        { time: 106.0, text: "너를 사랑해 (사랑해!) 이만큼", color: "blue" },
        { time: 109.0, text: "너를 사랑해 (사랑해!) 쏟아질 만큼", color: "blue" },
        { time: 112.0, text: "(사랑해!) 그 만큼", color: "blue" },
        { time: 116.0, text: "[간주 중 - 트라이앵글 짱!]", color: "" },
        { time: 156.0, text: "댄스머신 황현우! 절대매력 번도미!", color: "red" },
        { time: 160.0, text: "폭풍래퍼 구상구! 트 라이! 앵! 글!", color: "blue" },
        { time: 166.0, text: "say hey ho hey ho", color: "green" },
        { time: 171.0, text: "사랑이 뭔지 love is (내꺼하자 구상구!)", color: "red" },
        { time: 176.0, text: "설마 너 이러면 어떡하지 (왜!)", color: "blue" },
        { time: 179.0, text: "저러면 어떡하지 (왜!)", color: "blue" },
        { time: 183.0, text: "그만하고 대답해 줄래? (내꺼하자 번도미!)", color: "red" },
        { time: 187.0, text: "아직은 아냐 (왜!), 지금 말야", color: "blue" },
        { time: 191.0, text: "그러면 안돼 (왜!), 이러면 안돼", color: "blue" },
        { time: 201.0, text: "계속 될 거라고 약속해 my love (약속해!)", color: "blue" },
        { time: 211.0, text: "너를 사랑해 (사랑해!) 이만큼", color: "blue" },
        { time: 215.0, text: "너를 사랑해 (사랑해!) 쏟아질 만큼", color: "blue" },
        { time: 221.0, text: "나나나 나나나나나 나나 나나", color: "green" },
        { time: 226.0, text: "(황현우! 번도미! 구상구! 사랑해!)", color: "green" },
        { time: 231.0, text: "Triangle's in the house", color: "" },
        { time: 236.0, text: "(트트트! 트라이앵글!)", color: "blue" }
    ];

    const video = document.getElementById('mv');
    const startBtn = document.getElementById('start-btn');
    const currentLine = document.getElementById('current-line');
    const nextLine = document.getElementById('next-line');
    const scoreDisplay = document.getElementById('score');
    const stamp = document.getElementById('stamp');

    let lastIdx = -1;
    let score = 0;
    let canScore = false;
    let scoredLine = -1;

    startBtn.addEventListener('click', async () => {
        try {
            await setupMic();
            video.play();
            startBtn.style.display = 'none';
        } catch(e) { alert("마이크 권한이 필요합니다."); }
    });

    video.addEventListener('timeupdate', () => {
        const cur = video.currentTime;
        const idx = lyricsData.findLastIndex(l => cur >= l.time);

        if (idx !== -1 && idx !== lastIdx) {
            const data = lyricsData[idx];
            const next = lyricsData[idx + 1];

            // 가사 갱신 및 초기화
            currentLine.innerText = data.text;
            currentLine.setAttribute('data-text', data.text);
            currentLine.className = `karaoke-line ${data.color}`;
            currentLine.style.transition = 'none';
            currentLine.style.width = '0%';

            // 채우기 애니메이션 실행 (다음 가사 전까지)
            setTimeout(() => {
                const duration = next ? (next.time - data.time) : 2.5;
                currentLine.style.transition = `width ${duration}s linear`;
                currentLine.style.width = '100%';
            }, 50);

            // 음성 인식 게이트 설정 (색상이 있는 구간만 마이크 개방)
            canScore = data.color !== "";
            
            if (next) nextLine.innerText = "Next: " + next.text;
            else nextLine.innerText = "Triangle Forever!";

            lastIdx = idx;
        }
    });

    async function setupMic() {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        const ctx = new AudioContext();
        const analyser = ctx.createAnalyser();
        const src = ctx.createMediaStreamSource(stream);
        src.connect(analyser);
        const buffer = new Uint8Array(analyser.frequencyBinCount);

        function detect() {
            analyser.getByteFrequencyData(buffer);
            const vol = buffer.reduce((a, b) => a + b) / buffer.length;

            // 판정 조건: 응원 구간 + 큰 소리 + 이번 문장에서 점수 획득 전
            if (canScore && vol > 50 && scoredLine !== lastIdx) {
                scoredLine = lastIdx;
                updateScore();
            }
            requestAnimationFrame(detect);
        }
        detect();
    }

    function updateScore() {
        score += 100;
        scoreDisplay.innerText = score;
        stamp.classList.add('pop');
        setTimeout(() => stamp.classList.remove('pop'), 1000);
    }

    // 싱크 조절용 (스페이스바 누르면 콘솔에 시간 출력)
    window.onkeydown = (e) => {
        if(e.code === 'Space') {
            e.preventDefault();
            console.log(`{ time: ${video.currentTime.toFixed(1)}, text: "${lyricsData[lastIdx+1]?.text}" },`);
        }
    }
</script>

</body>
</html>
